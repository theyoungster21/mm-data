description: '<p>First, there were hushed rumors of unknown raiders. Then, there were reports of mysterious superweapons that caused immense damage to their victims…and their users. 
  Reports from planet Bryant went even further, as tales of alien tripods mutated into outlandish horror stories. 
  A decade later, the Republic defenders of Terra not only had all the technological miracles at their disposal—but also the matching, fearful mythology. 
  It is time to parse the truth.</p> 
  <p><strong>Experimental Technical Readout: RISC</strong> samples BattleMechs (and a vehicle) used as testbeds by the Republic Institute of Strategic Combat (RISC). 
  Most were tested in false flag operations around former Republic worlds during the 3130s. 
  Many were deployed in the Republic’s desperate defense against encroaching Great House and Clan formations during the 3140s. 
  All units featured in this book incorporate some of the technologies developed by the RISC (found in Interstellar Operations: Alternate Eras). 
  Statistics and Record Sheets are included for 13 new experimental BattleMechs (and 1 vehicle!), ready for play in advanced BattleTech games.</p>'
