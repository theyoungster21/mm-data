description: 'Some soldiers fight for money, some to spread their version of liberty, still others for a sense of adventure. For the men and women of the Draconis Combine Mustered Soldiery there is only one reason for service: the honor of the Dragon.
  From the moment Shiro Kurita raised the Dragon’s banner, the soldiers of House Kurita have remained dedicated to the warrior’s path above all others. For seven centuries they have spread fear and respect in equal measure, expanding and protecting the Dragon with loyalty and honor tempered by the ancient code of bushido and force in battles on a hundred worlds. 
  Force Manual: Kurita details the armed forces of the Draconis Combine, examining the combat commands of the Draconis Combine and their histories, tactics, unit crests, paint schemes, and notable personnel. This sourcebook includes special rules for unique character abilities, faction-specific rules, force building options, and a mini-Technical Readout–everything you need to field your favorite Draconis Combine unit on the tabletop, or create your own.'
