description: 'Record Sheets: 3055 Upgrade contains record sheets for most of the ''Mech and aerospace fighter units described in Technical Readout: 3055 Upgrade. 
  It also includes a host of rules and scenarios covering the arenas of Solaris VII: the Game World. Notably, it offers three record sheets for Gray Noton''s famous Legend-Killer, 
  but given the mystery surrounding that BattleMech''s exact configurations they are expressly described as speculative, 
  i.e. they are not meant to canonically describe Legend-Killer and effectively amount to a canon rumor.'
