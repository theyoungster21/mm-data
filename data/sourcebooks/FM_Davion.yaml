description: 'Some soldiers fight for money, some serve for honor, still others for a sense of adventure. The warriors of the Federated Suns protect the freedoms their nation holds dear.
  From the horror of Kentares to the glory of Tikonov, the soldiers of House Davion answer the call to serve their people. Force Manual: Davion details the histories and traditions of the Armed Forces of the Federated Suns. From the Field Marshal of the Davion Brigade of Guards to the newest recruit of the Capellan March Militia, they are the sword and shield that guards the borders of the Federated Suns from the tyranny without, and they wear their spurs with pride.
  Force Manual: Davion details the Armed Forces of the Federated Suns, examining the combat commands of the Federated Suns and their histories, tactics, unit crests, paint schemes, and notable personnel. This sourcebook includes special rules for unique character abilities, faction-specific rules, force building options, and a mini-Technical Readout–everything you need to field your favorite Federated Suns unit on the tabletop, or create your own.
  For use with Total Warfare and Alpha Strike.'
